version: '3.9'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: naneka_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: naneka
      POSTGRES_USER: naneka_user
      POSTGRES_PASSWORD: changeme
    ports:
      - '5432:5432'
    volumes:
      - naneka_pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: naneka_backend
    restart: unless-stopped
    depends_on:
      - db
    env_file: .env
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: naneka_frontend
    restart: unless-stopped
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  naneka_pgdata:
